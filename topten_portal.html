<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탑텐 영업지원 포털</title>
<style>
:root{
  --primary:#1a1a2e; --accent:#e94560; --accent2:#0f3460;
  --bg:#f5f6fa; --card:#fff; --border:#e0e0e0;
  --text:#2d2d2d; --muted:#888;
  --success:#27ae60; --warning:#f39c12; --danger:#e74c3c; --info:#2980b9;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ===== 로그인 ===== */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:linear-gradient(135deg,var(--primary) 0%,var(--accent2) 100%);
}
.login-box{
  background:#fff;border-radius:20px;padding:40px 36px;
  width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;
}
.login-logo{font-size:28px;font-weight:800;color:var(--primary);margin-bottom:6px;letter-spacing:2px;}
.login-logo span{color:var(--accent);}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
.login-box input{
  width:100%;border:2px solid var(--border);border-radius:10px;
  padding:12px 16px;font-size:15px;outline:none;font-family:inherit;
  transition:border-color .2s;margin-bottom:14px;text-align:center;letter-spacing:4px;
}
.login-box input:focus{border-color:var(--accent2);}
.login-btn{
  width:100%;background:var(--accent);color:#fff;border:none;
  border-radius:10px;padding:13px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:background .2s;
}
.login-btn:hover{background:#c73652;}
.login-err{color:var(--danger);font-size:13px;margin-top:10px;display:none;}

/* ===== 앱 ===== */
#app{display:none;}
header{background:var(--primary);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.logo{font-size:18px;font-weight:700;letter-spacing:1px;}.logo span{color:var(--accent);}
.logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;}
.logout-btn:hover{background:rgba(255,255,255,.25);}
nav{background:var(--accent2);display:flex;overflow-x:auto;position:sticky;top:56px;z-index:99;}
nav button{background:none;border:none;color:rgba(255,255,255,.7);padding:13px 22px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;border-bottom:3px solid transparent;font-family:inherit;}
nav button:hover{color:#fff;background:rgba(255,255,255,.08);}
nav button.active{color:#fff;border-bottom-color:var(--accent);background:rgba(255,255,255,.12);}
.page{display:none;padding:20px;max-width:1300px;margin:0 auto;}.page.active{display:block;}

/* 카드 */
.card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid var(--border);}
.search-bar{display:flex;gap:10px;align-items:center;background:var(--card);padding:14px 18px;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid var(--border);margin-bottom:14px;flex-wrap:wrap;}
.search-bar input,.search-bar select{border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;outline:none;transition:border-color .2s;font-family:inherit;}
.search-bar input{flex:1;min-width:180px;}.search-bar input:focus,.search-bar select:focus{border-color:var(--accent);}
.stats-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.stat-badge{background:var(--card);border-radius:10px;padding:12px 16px;border:1px solid var(--border);text-align:center;flex:1;min-width:110px;}
.stat-badge .val{font-size:22px;font-weight:700;color:var(--accent2);}.stat-badge .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.store-card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border);cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.store-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.12);border-color:var(--accent);}
.sc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.sc-name{font-size:15px;font-weight:700;}.sc-rank{background:var(--primary);color:#fff;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:600;}
.sc-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.tag{border-radius:5px;padding:3px 8px;font-size:11px;font-weight:500;}
.tag.cat{background:#f0f2ff;color:var(--accent2);}.tag.region{background:#fff0f3;color:var(--accent);}.tag.mgr{background:#f0fff4;color:var(--success);}
.sc-kpi{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;border-top:1px solid var(--border);padding-top:8px;}
.kpi-item{text-align:center;}.kpi-item .k-val{font-size:14px;font-weight:700;}.kpi-item .k-lbl{font-size:10px;color:var(--muted);}
.positive{color:var(--success);}.negative{color:var(--danger);}.neutral{color:var(--info);}
.result-count{font-size:12px;color:var(--muted);margin-bottom:10px;}

/* 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:620px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal h2{font-size:20px;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.modal-close{margin-left:auto;background:#f0f0f0;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.info-item .i-lbl{font-size:11px;color:var(--muted);margin-bottom:3px;}.info-item .i-val{font-size:14px;font-weight:600;}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
.kpi-big{background:var(--bg);border-radius:10px;padding:12px;text-align:center;}
.kpi-big .kb-val{font-size:20px;font-weight:800;}.kpi-big .kb-lbl{font-size:11px;color:var(--muted);margin-top:3px;}

/* 신청 */
.req-wrap{max-width:780px;margin:0 auto;}
.step-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.step-back{background:none;border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;}
.step-back:hover{border-color:var(--accent2);color:var(--accent2);}
.step-title{font-size:20px;font-weight:700;}
.task-select-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:8px;}
.task-select-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:18px 16px;cursor:pointer;transition:all .2s;font-family:inherit;text-align:left;width:100%;}
.task-select-card:hover{border-color:var(--accent2);background:#f0f2ff;transform:translateY(-1px);}
.task-select-card .tc-num{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.task-select-card .tc-icon{font-size:24px;margin-bottom:6px;}
.task-select-card .tc-name{font-size:14px;font-weight:700;line-height:1.4;}
.task-select-card .tc-timing{font-size:11px;color:var(--accent);margin-top:4px;font-weight:600;}
.form-box{background:var(--card);border-radius:12px;padding:22px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px;}
.form-box-title{font-size:14px;font-weight:700;color:var(--accent2);margin-bottom:14px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
.fg label .req{color:var(--accent);}
.fg label .hint{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px;}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;transition:border-color .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent2);}
.fg textarea{min-height:80px;resize:vertical;}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.radio-group{display:flex;gap:10px;flex-wrap:wrap;}
.radio-btn{border:2px solid var(--border);border-radius:8px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;background:#fff;font-family:inherit;}
.radio-btn:hover{border-color:var(--accent2);}
.radio-btn.sel{border-color:var(--accent);background:#fff0f3;color:var(--accent);}
.file-zone{border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;}
.file-zone:hover{border-color:var(--accent2);}
.file-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.file-zone .fz-icon{font-size:24px;margin-bottom:4px;}
.file-zone .fz-text{font-size:12px;color:var(--muted);}
.file-names{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
.file-chip{background:#f0f2ff;color:var(--accent2);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;}
.btn-submit{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .2s;}
.btn-submit:hover{background:#c73652;}

/* 대시보드 */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.filter-btn{border:1.5px solid var(--border);border-radius:20px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;font-family:inherit;transition:all .2s;}
.filter-btn:hover{border-color:var(--accent2);}
.filter-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2);}
.task-item{display:flex;gap:12px;background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);margin-bottom:8px;align-items:flex-start;}
.ti-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dot-open{background:var(--info);}.dot-close{background:var(--danger);}.dot-admin{background:var(--success);}
.ti-left{flex:1;}
.ti-store{font-size:14px;font-weight:700;margin-bottom:3px;}
.ti-type{font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:3px;}
.ti-detail{font-size:12px;color:var(--muted);}
.ti-right{flex-shrink:0;}
.status-sel{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;font-family:inherit;cursor:pointer;outline:none;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.es-icon{font-size:48px;margin-bottom:12px;}
#dash-stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}

/* 토스트 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;z-index:999;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">TOP<span>10</span></div>
    <div class="login-sub">영업지원 포털 — 내부 전용</div>
    <input type="password" id="pw-input" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err">비밀번호가 올바르지 않습니다</div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
<header>
  <div class="logo">TOP<span>10</span> 영업지원 포털</div>
  <button class="logout-btn" onclick="doLogout()">로그아웃</button>
</header>
<nav>
  <button class="active" onclick="showPage('store',this)">🏪 매장 검색</button>
  <button onclick="showPage('open',this)">🏗️ 신규 오픈 신청</button>
  <button onclick="showPage('close',this)">🔒 폐점·이전 신청</button>
  <button onclick="showPage('admin',this)">💻 전산·행정 신청</button>
  <button onclick="showPage('dashboard',this)">📋 할 일 대시보드</button>
</nav>

<!-- 매장검색 -->
<div id="page-store" class="page active">
  <div class="search-bar">
    <input id="search-input" placeholder="🔍 매장명 검색..." oninput="filterStores()">
    <select id="filter-region" onchange="filterStores()"><option value="">전체 지역</option></select>
    <select id="filter-category" onchange="filterStores()"><option value="">전체 유형</option></select>
    <select id="filter-manager" onchange="filterStores()"><option value="">전체 담당자</option></select>
  </div>
  <div class="stats-row">
    <div class="stat-badge"><div class="val" id="st-total">-</div><div class="lbl">전체 매장</div></div>
    <div class="stat-badge"><div class="val" id="st-filtered">-</div><div class="lbl">검색 결과</div></div>
    <div class="stat-badge"><div class="val" id="st-soon">-</div><div class="lbl">계약 만료 임박</div></div>
  </div>
  <div class="result-count" id="result-count"></div>
  <div class="store-grid" id="store-grid"></div>
</div>

<!-- 신규오픈 -->
<div id="page-open" class="page">
  <div class="req-wrap">
    <div id="open-step1">
      <div style="font-size:20px;font-weight:700;margin-bottom:6px;">🏗️ 신규 오픈 신청</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">업무 유형을 선택하세요</div>
      <div class="task-select-grid" id="open-task-grid"></div>
    </div>
    <div id="open-step2" style="display:none;">
      <div class="step-header">
        <button class="step-back" onclick="backToStep1('open')">← 뒤로</button>
        <div class="step-title" id="open-step2-title"></div>
      </div>
      <div class="form-box">
        <div class="form-box-title">📋 공통 정보</div>
        <div class="fg"><label>구분 <span class="req">*</span></label>
          <div class="radio-group">
            <button class="radio-btn" onclick="selectRadio(this,'open-store-type','가두직영')">가두직영</button>
            <button class="radio-btn" onclick="selectRadio(this,'open-store-type','유통사')">유통사</button>
          </div>
          <input type="hidden" id="open-store-type">
        </div>
        <div class="fg-row">
          <div class="fg"><label>담당자 이름 <span class="req">*</span></label><input id="open-manager" placeholder="이름 입력"></div>
          <div class="fg"><label>매장명 <span class="req">*</span></label><input id="open-store" list="open-store-dl" placeholder="매장명 검색"><datalist id="open-store-dl"></datalist></div>
        </div>
        <div class="fg-row">
          <div class="fg"><label>신청 날짜</label><input type="date" id="open-req-date"></div>
          <div class="fg"><label>오픈 예정일</label><input type="date" id="open-target-date"></div>
        </div>
        <div class="fg"><label>요청 기한 <span class="req">*</span></label><input type="date" id="open-deadline"></div>
        <div class="fg"><label>요청 내용 <span class="req">*</span></label><textarea id="open-content" placeholder="요청 내용을 입력하세요"></textarea></div>
        <div class="fg"><label>첨부 파일 <span class="hint">(선택)</span></label>
          <div class="file-zone"><div class="fz-icon">📎</div><div class="fz-text">파일을 클릭하거나 끌어다 놓으세요</div>
          <input type="file" multiple onchange="showFiles(this,'open-files')"></div>
          <div class="file-names" id="open-files"></div>
        </div>
      </div>
      <button class="btn-submit" onclick="submitReq('open')">✅ 신청 제출하기</button>
    </div>
  </div>
</div>

<!-- 폐점이전 -->
<div id="page-close" class="page">
  <div class="req-wrap">
    <div id="close-step1">
      <div style="font-size:20px;font-weight:700;margin-bottom:6px;">🔒 폐점·이전 신청</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">업무 유형을 선택하세요</div>
      <div class="task-select-grid" id="close-task-grid"></div>
    </div>
    <div id="close-step2" style="display:none;">
      <div class="step-header">
        <button class="step-back" onclick="backToStep1('close')">← 뒤로</button>
        <div class="step-title" id="close-step2-title"></div>
      </div>
      <div class="form-box">
        <div class="form-box-title">📋 공통 정보</div>
        <div class="fg"><label>구분 <span class="req">*</span></label>
          <div class="radio-group">
            <button class="radio-btn" onclick="selectRadio(this,'close-store-type','가두직영')">가두직영</button>
            <button class="radio-btn" onclick="selectRadio(this,'close-store-type','유통사')">유통사</button>
          </div>
          <input type="hidden" id="close-store-type">
        </div>
        <div class="fg-row">
          <div class="fg"><label>담당자 이름 <span class="req">*</span></label><input id="close-manager" placeholder="이름 입력"></div>
          <div class="fg"><label>매장명 <span class="req">*</span></label><input id="close-store" list="close-store-dl" placeholder="매장명 검색"><datalist id="close-store-dl"></datalist></div>
        </div>
        <div class="fg-row">
          <div class="fg"><label>신청 날짜</label><input type="date" id="close-req-date"></div>
          <div class="fg"><label>폐점 예정일</label><input type="date" id="close-target-date"></div>
        </div>
        <div class="fg"><label>요청 기한 <span class="req">*</span></label><input type="date" id="close-deadline"></div>
        <div class="fg"><label>요청 내용 <span class="req">*</span></label><textarea id="close-content" placeholder="요청 내용을 입력하세요"></textarea></div>
        <div class="fg"><label>첨부 파일 <span class="hint">(선택)</span></label>
          <div class="file-zone"><div class="fz-icon">📎</div><div class="fz-text">파일을 클릭하거나 끌어다 놓으세요</div>
          <input type="file" multiple onchange="showFiles(this,'close-files')"></div>
          <div class="file-names" id="close-files"></div>
        </div>
      </div>
      <button class="btn-submit" onclick="submitReq('close')">✅ 신청 제출하기</button>
    </div>
  </div>
</div>

<!-- 전산행정 -->
<div id="page-admin" class="page">
  <div class="req-wrap">
    <div style="font-size:20px;font-weight:700;margin-bottom:20px;">💻 전산·행정 신청</div>
    <div class="form-box">
      <div class="form-box-title">📋 신청 정보</div>
      <div class="fg"><label>업무 구분 <span class="req">*</span></label>
        <select id="admin-sub">
          <option value="">선택하세요</option>
          <option>웍스(POS) 신청</option>
          <option>인터넷/전화 개통</option>
          <option>CCTV 설치/철수</option>
          <option>전산 장비 교체</option>
          <option>기안 작성</option>
          <option>ECS 공문</option>
          <option>보고서 작성</option>
          <option>기타 행정</option>
        </select>
      </div>
      <div class="fg"><label>구분 <span class="req">*</span></label>
        <div class="radio-group">
          <button class="radio-btn" onclick="selectRadio(this,'admin-store-type','가두직영')">가두직영</button>
          <button class="radio-btn" onclick="selectRadio(this,'admin-store-type','유통사')">유통사</button>
        </div>
        <input type="hidden" id="admin-store-type">
      </div>
      <div class="fg-row">
        <div class="fg"><label>담당자 이름 <span class="req">*</span></label><input id="admin-manager" placeholder="이름 입력"></div>

// ===== 로그인 =====
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === CORRECT_PW) {
    sessionStorage.setItem('topten_auth','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  } else {
    const err = document.getElementById('login-err');
    err.style.display='block';
    document.getElementById('pw-input').value='';
    setTimeout(()=>err.style.display='none', 2500);
  }
}
function doLogout() { sessionStorage.removeItem('topten_auth'); location.reload(); }
if (sessionStorage.getItem('topten_auth')==='1') {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
}

// ===== Google Sheets 연동 =====
function sheetPost(params) {
  const fd = new FormData();
  Object.entries(params).forEach(([k,v]) => fd.append(k, v));
  return fetch(APPS_SCRIPT_URL, {method:'POST', body:fd, mode:'no-cors'});
}
function sheetGet(callback) {
  const cbName = 'topten_cb_' + Date.now();
  window[cbName] = function(data) {
    delete window[cbName];
    const el = document.getElementById('jsonp-loader');
    if (el) el.remove();
    callback(data);
  };
  const s = document.createElement('script');
  s.id = 'jsonp-loader';
  s.src = APPS_SCRIPT_URL + '?cb=' + cbName + '&t=' + Date.now();
  s.onerror = function() { delete window[cbName]; s.remove(); showToast('❗ 데이터 로드 실패'); callback({tasks:[]}); };
  const old = document.getElementById('jsonp-loader');
  if (old) old.remove();
  document.head.appendChild(s);
}

let dashFilter = 'all';
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='dashboard') renderDashboard();
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function today() { return new Date().toISOString().slice(0,10); }

// ===== 초기화 =====
function initApp() {
  const regions=[...new Set(STORES.map(s=>s.region).filter(Boolean))].sort();
  const rsel=document.getElementById('filter-region');
  regions.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;rsel.appendChild(o);});

  const cats=[...new Set(STORES.map(s=>s.category).filter(Boolean))].sort();
  const csel=document.getElementById('filter-category');
  cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;csel.appendChild(o);});

  const mgrs=[...new Set(STORES.map(s=>s.manager).filter(Boolean))].sort();
  const msel=document.getElementById('filter-manager');
  mgrs.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;msel.appendChild(o);});

  ['open-store-dl','close-store-dl','admin-store-dl'].forEach(dlId=>{
    const dl=document.getElementById(dlId);
    STORES.forEach(s=>{const o=document.createElement('option');o.value=s.name;dl.appendChild(o);});
  });

  ['open-req-date','close-req-date','admin-req-date'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value=today();
  });

  buildTaskGrids();
  filterStores();
  renderDashboard();
}
if (sessionStorage.getItem('topten_auth')==='1') initApp();

// ===== 매장 검색 =====
function filterStores() {
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  const region=document.getElementById('filter-region').value;
  const cat=document.getElementById('filter-category').value;
  const mgr=document.getElementById('filter-manager').value;
  let filtered=STORES.filter(s=>{
    if(q && !s.name.toLowerCase().includes(q) && !(s.region_detail||'').toLowerCase().includes(q)) return false;
    if(region && s.region!==region) return false;
    if(cat && s.category!==cat) return false;
    if(mgr && s.manager!==mgr) return false;
    return true;
  });
  const now=new Date();
  const soon=STORES.filter(s=>{
    if(!s.contract_end) return false;
    const d=new Date(s.contract_end);
    return (d-now)/86400000>=0 && (d-now)/86400000<=90;
  }).length;
  document.getElementById('st-total').textContent=STORES.length;
  document.getElementById('st-filtered').textContent=filtered.length;
  document.getElementById('st-soon').textContent=soon;
  document.getElementById('result-count').textContent=filtered.length+'개 매장 표시 중';
  renderGrid(filtered);
}
function renderGrid(list) {
  const g=document.getElementById('store-grid');
  if(!list.length){g.innerHTML='<div class="empty-state"><div class="es-icon">🔍</div><p>검색 결과가 없습니다</p></div>';return;}
  g.innerHTML=list.map(s=>{
    const ach=s.achievement!=null?s.achievement:null;
    const grow=s.growth!=null?s.growth:null;
    const achCls=ach==null?'neutral':ach>=100?'positive':'negative';
    const growCls=grow==null?'neutral':grow>=0?'positive':'negative';
    return `<div class="store-card" onclick="openModal('${s.id}')">
      <div class="sc-header">
        <div class="sc-name">${s.name}</div>
        ${s.no?`<div class="sc-rank">#${s.no}</div>`:''}
      </div>
      <div class="sc-meta">
        <span class="tag cat">${s.category}</span>
        <span class="tag region">${s.region}</span>
        ${s.manager?`<span class="tag mgr">👤 ${s.manager}</span>`:''}
      </div>
      <div class="sc-kpi">
        <div class="kpi-item"><div class="k-val ${achCls}">${ach!=null?ach+'%':'-'}</div><div class="k-lbl">일간달성</div></div>
        <div class="kpi-item"><div class="k-val ${growCls}">${grow!=null?(grow>=0?'+':'')+grow+'%':'-'}</div><div class="k-lbl">신장율</div></div>
        <div class="kpi-item"><div class="k-val neutral">${s.area_sales!=null?s.area_sales+'㎡':'-'}</div><div class="k-lbl">면적</div></div>
      </div>
    </div>`;
  }).join('');
}
function openModal(id) {
  const s=STORES.find(x=>x.id===id);
  if(!s) return;
  const now=new Date();
  const contEnd=s.contract_end?new Date(s.contract_end):null;
  const dday=contEnd?Math.round((contEnd-now)/86400000):null;
  const ddayStr=dday!=null?(dday>0?`D-${dday}`:(dday===0?'D-Day':`D+${Math.abs(dday)}`)):'-';
  const ddayColor=dday!=null&&dday<=90?'var(--danger)':'var(--success)';
  document.getElementById('modal-content').innerHTML=`
    <h2>🏪 ${s.name} <button class="modal-close" onclick="closeModal()">✕</button></h2>
    <div class="info-grid">
      <div class="info-item"><div class="i-lbl">매장 ID</div><div class="i-val">${s.id}</div></div>
      <div class="info-item"><div class="i-lbl">담당자</div><div class="i-val">${s.manager||'-'}</div></div>
      <div class="info-item"><div class="i-lbl">지역</div><div class="i-val">${s.region_detail||s.region||'-'}</div></div>
      <div class="info-item"><div class="i-lbl">유형</div><div class="i-val">${s.category||'-'}</div></div>
      <div class="info-item"><div class="i-lbl">층</div><div class="i-val">${s.floor||'-'}</div></div>
      <div class="info-item"><div class="i-lbl">매장 형태</div><div class="i-val">${s.type||'-'}</div></div>
      <div class="info-item"><div class="i-lbl">전체 면적</div><div class="i-val">${s.area_total!=null?s.area_total+'㎡':'-'}</div></div>
      <div class="info-item"><div class="i-lbl">영업 면적</div><div class="i-val">${s.area_sales!=null?s.area_sales+'㎡':'-'}</div></div>
      <div class="info-item"><div class="i-lbl">입점일</div><div class="i-val">${s.open_date||'-'}</div></div>
      <div class="info-item"><div class="i-lbl">계약 종료일</div><div class="i-val" style="color:${ddayColor};font-weight:700;">${s.contract_end||'-'} (${ddayStr})</div></div>
    </div>
    <div class="kpi-grid">
      <div class="kpi-big"><div class="kb-val ${s.achievement>=100?'positive':'negative'}">${s.achievement!=null?s.achievement+'%':'-'}</div><div class="kb-lbl">일간 달성률</div></div>
      <div class="kpi-big"><div class="kb-val ${s.growth>=0?'positive':'negative'}">${s.growth!=null?(s.growth>=0?'+':'')+s.growth+'%':'-'}</div><div class="kb-lbl">신장율</div></div>
      <div class="kpi-big"><div class="kb-val neutral">${s.monthly_avg!=null?s.monthly_avg+'억':'-'}</div><div class="kb-lbl">월평균(최근)</div></div>
    </div>`;
  document.getElementById('store-modal').classList.add('open');
}
function closeModal(){document.getElementById('store-modal').classList.remove('open');}

let currentOpenTask='', currentCloseTask='';

function buildTaskGrids() {
  document.getElementById('open-task-grid').innerHTML=OPEN_TASKS.map(t=>`
    <button class="task-select-card" onclick="openForm('open','${t.key}')">
      <div class="tc-num">TAB ${t.num}</div><div class="tc-icon">${t.icon}</div>
      <div class="tc-name">${t.name}</div><div class="tc-timing">⏰ ${t.timing}</div>
    </button>`).join('');
  document.getElementById('close-task-grid').innerHTML=CLOSE_TASKS.map(t=>`
    <button class="task-select-card" onclick="openForm('close','${t.key}')">
      <div class="tc-num">TAB ${t.num}</div><div class="tc-icon">${t.icon}</div>
      <div class="tc-name">${t.name}</div><div class="tc-timing">⏰ ${t.timing}</div>
    </button>`).join('');
}
function openForm(category, taskKey) {
  const tasks=category==='open'?OPEN_TASKS:CLOSE_TASKS;
  const task=tasks.find(t=>t.key===taskKey);
  if(!task) return;
  if(category==='open'){
    currentOpenTask=taskKey;
    document.getElementById('open-step2-title').textContent=task.icon+' '+task.name;
    document.getElementById('open-step1').style.display='none';
    document.getElementById('open-step2').style.display='block';
  } else {
    currentCloseTask=taskKey;
    document.getElementById('close-step2-title').textContent=task.icon+' '+task.name;
    document.getElementById('close-step1').style.display='none';
    document.getElementById('close-step2').style.display='block';
  }
}
function backToStep1(category) {
  if(category==='open'){
    document.getElementById('open-step1').style.display='block';
    document.getElementById('open-step2').style.display='none';
  } else {
    document.getElementById('close-step1').style.display='block';
    document.getElementById('close-step2').style.display='none';
  }
}
function selectRadio(btn, fieldId, val) {
  btn.closest('.radio-group').querySelectorAll('.radio-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById(fieldId).value=val;
}
function showFiles(input, targetId) {
  const names=[...input.files].map(f=>f.name);
  document.getElementById(targetId).innerHTML=names.map(n=>`<span class="file-chip">📎 ${n}</span>`).join('');
}

// ===== 신청 제출 =====
function submitReq(category) {
  if(category==='open'){
    const manager=document.getElementById('open-manager').value.trim();
    const store=document.getElementById('open-store').value.trim();
    const storeType=document.getElementById('open-store-type').value;
    const content=document.getElementById('open-content').value.trim();
    const deadline=document.getElementById('open-deadline').value;
    if(!manager||!store||!storeType||!content||!deadline){showToast('❗ 필수 항목을 모두 입력해주세요');return;}
    const task=OPEN_TASKS.find(t=>t.key===currentOpenTask);
    sheetPost({action:'submit',category:'open',taskKey:currentOpenTask,
      typeName:'🏗️ 신규오픈 — '+(task?task.name:''),
      store,manager,storeType,content,deadline,
      reqDate:document.getElementById('open-req-date').value,
      targetDate:document.getElementById('open-target-date').value
    }).then(()=>{backToStep1('open');showToast('✅ 신청이 완료되었습니다!');
      setTimeout(()=>{showPage('dashboard',document.querySelectorAll('nav button')[4]);},1300);
    }).catch(()=>{});

  } else if(category==='close'){
    const manager=document.getElementById('close-manager').value.trim();
    const store=document.getElementById('close-store').value.trim();
    const storeType=document.getElementById('close-store-type').value;
    const content=document.getElementById('close-content').value.trim();
    const deadline=document.getElementById('close-deadline').value;
    if(!manager||!store||!storeType||!content||!deadline){showToast('❗ 필수 항목을 모두 입력해주세요');return;}
    const task=CLOSE_TASKS.find(t=>t.key===currentCloseTask);
    sheetPost({action:'submit',category:'close',taskKey:currentCloseTask,
      typeName:'🔒 폐점·이전 — '+(task?task.name:''),
      store,manager,storeType,content,deadline,
      reqDate:document.getElementById('close-req-date').value,
      targetDate:document.getElementById('close-target-date').value
    }).then(()=>{backToStep1('close');showToast('✅ 신청이 완료되었습니다!');
      setTimeout(()=>{showPage('dashboard',document.querySelectorAll('nav button')[4]);},1300);
    }).catch(()=>{});

  } else if(category==='admin'){
    const manager=document.getElementById('admin-manager').value.trim();
    const store=document.getElementById('admin-store').value.trim();
    const storeType=document.getElementById('admin-store-type').value;
    const sub=document.getElementById('admin-sub').value;
    const content=document.getElementById('admin-content').value.trim();
    const deadline=document.getElementById('admin-deadline').value;
    if(!manager||!store||!storeType||!sub||!content||!deadline){showToast('❗ 필수 항목을 모두 입력해주세요');return;}
    sheetPost({action:'submit',category:'admin',taskKey:'admin',
      typeName:'💻 전산·행정 — '+sub,
      store,manager,storeType,content,deadline,
      reqDate:document.getElementById('admin-req-date').value,targetDate:''
    }).then(()=>{showToast('✅ 신청이 완료되었습니다!');
      setTimeout(()=>{showPage('dashboard',document.querySelectorAll('nav button')[4]);},1300);
    }).catch(()=>{});
  }
}

// ===== 대시보드 =====
function setDF(f,btn){dashFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderDashboard();}
function renderDashboard() {
  const list=document.getElementById('task-list');
  list.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:14px;">⏳ 데이터 불러오는 중...</div>';
  sheetGet(function(res){
    const tasks=(res&&res.tasks)?res.tasks:[];
    _renderDashboardUI(tasks);
  });
}
function _renderDashboardUI(tasks) {
  const pending=tasks.filter(t=>t.status==='pending').length;
  const progress=tasks.filter(t=>t.status==='progress').length;
  const done=tasks.filter(t=>t.status==='done').length;
  const today2=new Date(); today2.setHours(0,0,0,0);
  const urgent=tasks.filter(t=>{
    if(!t.deadline||t.status==='done') return false;
    const d=new Date(t.deadline); d.setHours(0,0,0,0);
    return (d-today2)/86400000<=3;
  }).length;
  document.getElementById('dash-stats').innerHTML=`
    <div class="stat-badge"><div class="val" style="color:var(--warning)">${pending}</div><div class="lbl">⏳ 대기중</div></div>
    <div class="stat-badge"><div class="val" style="color:var(--info)">${progress}</div><div class="lbl">🔄 처리중</div></div>
    <div class="stat-badge"><div class="val" style="color:var(--success)">${done}</div><div class="lbl">✅ 완료</div></div>
    <div class="stat-badge"><div class="val" style="color:var(--danger)">${urgent}</div><div class="lbl">🚨 기한 임박</div></div>`;
  let filtered=tasks;
  if(dashFilter==='pending') filtered=tasks.filter(t=>t.status==='pending');
  else if(dashFilter==='progress') filtered=tasks.filter(t=>t.status==='progress');
  else if(dashFilter==='done') filtered=tasks.filter(t=>t.status==='done');
  else if(dashFilter==='open') filtered=tasks.filter(t=>t.category==='open');
  else if(dashFilter==='close') filtered=tasks.filter(t=>t.category==='close');
  else if(dashFilter==='admin') filtered=tasks.filter(t=>t.category==='admin');
  const list=document.getElementById('task-list');
  if(!filtered.length){list.innerHTML='<div class="empty-state"><div class="es-icon">📭</div><p>신청 내역이 없습니다</p></div>';return;}
  const groups={};
  filtered.forEach(t=>{
    const d=(t.createdAt||'').slice(0,10)||'날짜없음';
    if(!groups[d]) groups[d]=[];
    groups[d].push(t);
  });
  const days=['일','월','화','수','목','금','토'];
  list.innerHTML=Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,items])=>{
    const dd=new Date(date);
    const label=`${date} (${days[dd.getDay()]})`;
    return `<div style="font-size:12px;font-weight:700;color:var(--muted);margin:8px 0 4px;padding-left:4px;">📅 ${label}</div>`
    +items.map(t=>{
      const todayMs=new Date(); todayMs.setHours(0,0,0,0);
      const dlMs=t.deadline?new Date(t.deadline):null;
      const dlDays=dlMs?Math.round((dlMs-todayMs)/86400000):null;
      const dlColor=dlDays!=null&&dlDays<=3&&t.status!=='done'?'color:var(--danger);font-weight:700':'color:var(--muted)';
      const dotCls=t.category==='open'?'dot-open':t.category==='close'?'dot-close':'dot-admin';
      const tid=String(t.id).replace(/"/g,'');
      return `<div class="task-item">
        <div class="ti-dot ${dotCls}" style="margin-top:4px;"></div>
        <div class="ti-left">
          <div class="ti-store">${t.store||''} <span style="font-size:12px;font-weight:400;color:var(--muted)">· ${t.storeType||''}</span></div>
          <div class="ti-type">${t.typeName||''} · 담당: ${t.manager||''}</div>
          <div class="ti-detail">${t.content||''}${t.deadline?` <span style="${dlColor}"> | 기한: ${t.deadline}${dlDays!=null?' (D-'+dlDays+')':''}</span>`:''}</div>
        </div>
        <div class="ti-right">
          <select class="status-sel" onchange="updateStatus('${tid}',this.value)">
            <option value="pending" ${t.status==='pending'?'selected':''}>⏳ 대기</option>
            <option value="progress" ${t.status==='progress'?'selected':''}>🔄 처리중</option>
            <option value="done" ${t.status==='done'?'selected':''}>✅ 완료</option>
          </select>
        </div>
      </div>`;
    }).join('');
  }).join('');
}
function updateStatus(id,status){
  sheetPost({action:'update',id:id,status:status})
    .then(()=>{showToast('상태가 업데이트되었습니다');renderDashboard();}).catch(()=>{});
}
function clearDone(){
  if(!confirm('완료된 항목을 모두 삭제할까요?')) return;
  sheetPost({action:'clear'})
    .then(()=>{showToast('🗑️ 완료 항목이 정리되었습니다');renderDashboard();}).catch(()=>{});
}
</script>
