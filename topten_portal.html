<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탑텐 영업지원 포털</title>
<style>
:root{
  --primary:#1a1a2e; --accent:#e94560; --accent2:#0f3460;
  --bg:#f5f6fa; --card:#fff; --border:#e0e0e0;
  --text:#2d2d2d; --muted:#888;
  --success:#27ae60; --warning:#f39c12; --danger:#e74c3c; --info:#2980b9;
  --weekly:#e67e22; --monthly:#27ae60; --annual:#8e44ad;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* 로그인 */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--primary) 0%,var(--accent2) 100%);}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
.login-logo{font-size:28px;font-weight:800;color:var(--primary);margin-bottom:6px;letter-spacing:2px;}
.login-logo span{color:var(--accent);}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
.login-box input{width:100%;border:2px solid var(--border);border-radius:10px;padding:12px 16px;font-size:15px;outline:none;font-family:inherit;transition:border-color .2s;margin-bottom:14px;text-align:center;letter-spacing:4px;}
.login-box input:focus{border-color:var(--accent2);}
.login-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;}
.login-btn:hover{background:#c73652;}
.login-err{color:var(--danger);font-size:13px;margin-top:10px;display:none;}
.auto-login-row{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:14px;cursor:pointer;}
.auto-login-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent2);cursor:pointer;}
.auto-login-row span{font-size:13px;color:var(--muted);user-select:none;}

/* 앱 */
#app{display:none;}
header{background:var(--primary);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.logo{font-size:18px;font-weight:700;letter-spacing:1px;}.logo span{color:var(--accent);}
.logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;}
.logout-btn:hover{background:rgba(255,255,255,.25);}
nav{background:var(--accent2);display:flex;overflow-x:auto;position:sticky;top:56px;z-index:99;}
nav button{background:none;border:none;color:rgba(255,255,255,.7);padding:13px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;border-bottom:3px solid transparent;font-family:inherit;}
nav button:hover{color:#fff;background:rgba(255,255,255,.08);}
nav button.active{color:#fff;border-bottom-color:var(--accent);background:rgba(255,255,255,.12);}
.page{display:none;padding:20px;max-width:1300px;margin:0 auto;}.page.active{display:block;}

/* 검색바 / 배지 */
.search-bar{display:flex;gap:10px;align-items:center;background:var(--card);padding:14px 18px;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid var(--border);margin-bottom:14px;flex-wrap:wrap;}
.search-bar input,.search-bar select{border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;outline:none;transition:border-color .2s;font-family:inherit;}
.search-bar input{flex:1;min-width:180px;}.search-bar input:focus,.search-bar select:focus{border-color:var(--accent);}
.stats-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.stat-badge{background:var(--card);border-radius:10px;padding:12px 16px;border:1px solid var(--border);text-align:center;flex:1;min-width:110px;}
.stat-badge .val{font-size:22px;font-weight:700;color:var(--accent2);}.stat-badge .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.stat-badge.clickable{cursor:pointer;transition:all .2s;}
.stat-badge.clickable:hover{border-color:var(--danger);box-shadow:0 2px 8px rgba(231,76,60,.2);}
.stat-badge.clickable.active-filter{border-color:var(--danger);background:#fff5f5;}
.stat-badge.clickable.active-filter .val{color:var(--danger);}.stat-badge.clickable.active-filter .lbl{color:var(--danger);}
.result-count{font-size:12px;color:var(--muted);margin-bottom:10px;}

/* 매장 카드 */
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.store-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.store-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12);border-color:var(--accent);}
.sc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sc-name{font-size:16px;font-weight:800;color:var(--primary);}
.sc-rank{background:var(--primary);color:#fff;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;}

/* sc-info 매장정보 영역 */
.sc-info{border-radius:10px;margin-bottom:10px;overflow:hidden;border:1px solid #dde2ef;}
.sc-info-mgr{background:linear-gradient(135deg,#1e90d6,#3aafe8);padding:9px 12px;display:flex;align-items:center;gap:8px;}
.sc-info-mgr .si-mgr-name{font-size:14px;font-weight:800;color:#fff;}
.sc-info-mgr .si-region-pill{background:rgba(255,255,255,.25);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;color:#fff;margin-left:auto;white-space:nowrap;}
.sc-info-detail{background:#f7f8fc;padding:8px 12px;display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;}
.si-field{display:flex;flex-direction:column;padding:5px 0;border-bottom:1px dashed #e0e4f0;}
.si-field:nth-last-child(-n+2){border-bottom:none;}
.si-lbl{font-size:9px;color:#999;font-weight:700;letter-spacing:.5px;margin-bottom:3px;}
.si-val{font-size:12px;font-weight:700;color:var(--primary);}
.si-val.cat{color:#5b2d8e;}.si-val.type{color:#c06000;}

.sc-divider{border:none;border-top:1px solid var(--border);margin:10px 0;}
.sc-kpi{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.kpi-cell{background:var(--bg);border-radius:8px;padding:8px 6px;text-align:center;}
.kpi-cell .k-val{font-size:14px;font-weight:800;line-height:1;}
.kpi-cell .k-lbl{font-size:10px;color:var(--muted);margin-top:3px;}
.positive{color:var(--success);}.negative{color:var(--danger);}.neutral{color:var(--info);}
.kpi-py{color:var(--accent2);}.kpi-avg{color:var(--danger);}

/* 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:1000px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal h2{font-size:20px;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.modal-close{margin-left:auto;background:#f0f0f0;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.info-item .i-lbl{font-size:11px;color:var(--muted);margin-bottom:3px;}.info-item .i-val{font-size:14px;font-weight:600;}
.section-label{font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 8px;padding-bottom:4px;border-bottom:2px solid var(--border);letter-spacing:.5px;}
.metrics-block{margin-bottom:10px;}
.metric-label{font-size:11px;font-weight:700;color:#fff;border-radius:5px;padding:3px 8px;display:inline-block;margin-bottom:6px;}
.metric-label.weekly{background:var(--weekly);}.metric-label.monthly{background:var(--monthly);}.metric-label.annual{background:var(--annual);}.metric-label.avg{background:var(--accent2);}
.metric-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.metric-item{background:var(--bg);border-radius:10px;padding:10px 12px;text-align:center;}
.metric-item .m-val{font-size:18px;font-weight:800;}.metric-item .m-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
.weekly-c{color:var(--weekly);}.monthly-c{color:var(--monthly);}.annual-c{color:var(--annual);}
.modal-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--border);}
.modal-body-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px;}
.modal-left,.modal-right{}
.modal-sec-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--border);}
.kpi-grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kpi-box2{background:var(--bg);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border);}
.kb2-lbl{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600;}
.kb2-val{font-size:18px;font-weight:800;margin-bottom:4px;}
.kb2-pct{font-size:13px;font-weight:700;}
.modal-op-section{background:#fff;border-radius:10px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.op-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
.op-box{background:var(--bg);padding:12px;text-align:center;}
.op-lbl{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.op-val{font-size:20px;font-weight:800;}
.modal-chart-section{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px;margin-bottom:12px;}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.chart-title{font-size:14px;font-weight:800;color:var(--primary);}
.chart-legend{display:flex;gap:12px;align-items:center;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);font-weight:600;}
.leg-dot{width:12px;height:4px;border-radius:2px;display:inline-block;}
.chart-wrap{width:100%;overflow:hidden;}
.modal-table-wrap{overflow-x:auto;}
.monthly-table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px;}
.monthly-table thead th{background:#f0f4fa;padding:7px 6px;text-align:center;font-weight:700;border:1px solid var(--border);white-space:nowrap;color:var(--accent2);}
.monthly-table tbody td{padding:7px 6px;text-align:center;border:1px solid #eee;white-space:nowrap;}
.mtr-data td:first-child{text-align:left;padding-left:10px;}
.mtr-pct{background:#fafbff;}
.mtr-pct td{padding:4px 6px;font-size:11px;}

/* 현황판 */
.summary-section{margin-bottom:24px;}
.summary-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:8px;}

/* 채널별 실적 테이블 */
.meeting-wrap-with-period{border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.12);overflow:hidden;}
.meeting-wrap{overflow-x:auto;border-radius:0;}
.meeting-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);min-width:750px;}
.meeting-table th{padding:9px 12px;text-align:center;font-size:11px;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,.2);}
.meeting-table td{padding:9px 12px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle;}
.meeting-table td.td-label{text-align:left;font-weight:700;padding-left:14px;}
.meeting-table td.td-sub{text-align:left;font-weight:500;padding-left:28px;color:#555;}
.th-base{background:var(--primary);}
.th-week{background:var(--weekly);}
.th-month{background:var(--monthly);}
.tr-total td{background:linear-gradient(90deg,#2c4a8f,#1e5fa8);color:#fff;font-weight:800;font-size:13px;border-top:2px solid #a8c4e8;border-bottom:2px solid #a8c4e8;}
.tr-total td.td-label{color:#fff;}
.tr-total td.p-pos{color:#b3ffd6;}.tr-total td.p-neg{color:#ffd0d0;}
.tr-section td{background:#fafbff;font-weight:700;border-top:2px solid #dde;}
.tr-adult td{background:#fff8e6;font-weight:800;font-size:13px;border-top:3px solid #e6a817;border-bottom:1px solid #f0d080;}
.tr-adult td.td-label{color:#7a4a00;}
.tr-adult td.p-pos{color:#1a7a3a;}.tr-adult td.p-neg{color:#b02020;}
.tr-sub td{background:#fff;}
.tr-ebiz td{background:#eef2fb;font-weight:700;border-top:1px solid #c5d3f0;}
.tr-balance td{background:#fff8f0;font-weight:700;border-top:2px solid #e67e22;}
.tr-sub:hover td,.tr-section:hover td,.tr-ebiz:hover td,.tr-balance:hover td,.tr-adult:hover td{background:#f5f7ff;}
.tr-total:hover td{background:linear-gradient(90deg,#3a5aa0,#2a6fc0);}
.p-pos{color:var(--success);font-weight:700;}.p-neg{color:var(--danger);font-weight:700;}.p-neu{color:var(--muted);}
.cnt-up{color:var(--success);font-size:10px;}.cnt-dn{color:var(--danger);font-size:10px;}

/* TOP10 랭킹 */
.ranking-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.ranking-box{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.ranking-box-header{padding:11px 16px;font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;}
.rh-top{background:linear-gradient(90deg,#27ae60,#2ecc71);}.rh-worst{background:linear-gradient(90deg,#c0392b,#e74c3c);}
.ranking-item{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);gap:10px;}
.ranking-item:last-child{border-bottom:none;}
.r-num{font-size:11px;font-weight:800;color:var(--muted);min-width:20px;text-align:center;}
.r-num.gold{color:#e6b800;}.r-num.silver{color:#95a5a6;}.r-num.bronze{color:#cd7f32;}
.r-name{flex:1;font-size:12px;font-weight:600;}
.r-pct{font-size:13px;font-weight:800;}.r-pct.pos{color:var(--success);}.r-pct.neg{color:var(--danger);}

/* 신청폼 */
.req-wrap{max-width:780px;margin:0 auto;}
.step-back{background:none;border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;}
.step-back:hover{border-color:var(--accent2);color:var(--accent2);}
.step-title{font-size:20px;font-weight:700;}
.step-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.task-select-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:8px;}
.task-select-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:18px 16px;cursor:pointer;transition:all .2s;font-family:inherit;text-align:left;width:100%;}
.task-select-card:hover{border-color:var(--accent2);background:#f0f2ff;transform:translateY(-1px);}
.task-select-card .tc-num{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.task-select-card .tc-icon{font-size:24px;margin-bottom:6px;}
.task-select-card .tc-name{font-size:14px;font-weight:700;line-height:1.4;}
.task-select-card .tc-timing{font-size:11px;color:var(--accent);margin-top:4px;font-weight:600;}
.form-box{background:var(--card);border-radius:12px;padding:22px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px;}
.form-box-title{font-size:14px;font-weight:700;color:var(--accent2);margin-bottom:14px;}
.fg{margin-bottom:16px;}.fg label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
.fg label .req{color:var(--accent);}.fg label .hint{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px;}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;transition:border-color .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent2);}
.fg textarea{min-height:80px;resize:vertical;}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.radio-group{display:flex;gap:10px;flex-wrap:wrap;}
.radio-btn{border:2px solid var(--border);border-radius:8px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;background:#fff;font-family:inherit;}
.radio-btn:hover{border-color:var(--accent2);}.radio-btn.sel{border-color:var(--accent);background:#fff0f3;color:var(--accent);}
.file-zone{border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;}
.file-zone:hover{border-color:var(--accent2);}
.file-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.file-zone .fz-icon{font-size:24px;margin-bottom:4px;}.file-zone .fz-text{font-size:12px;color:var(--muted);}
.file-names{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
.file-chip{background:#f0f2ff;color:var(--accent2);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;}
.btn-submit{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .2s;}
.btn-submit:hover{background:#c73652;}

/* 대시보드 */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.filter-btn{border:1.5px solid var(--border);border-radius:20px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;font-family:inherit;transition:all .2s;}
.filter-btn:hover{border-color:var(--accent2);}.filter-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2);}
.task-item{display:flex;gap:12px;background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);margin-bottom:8px;align-items:flex-start;}
.ti-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dot-open{background:var(--info);}.dot-close{background:var(--danger);}.dot-admin{background:var(--success);}
.ti-left{flex:1;}.ti-store{font-size:14px;font-weight:700;margin-bottom:3px;}
.ti-type{font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:3px;}.ti-detail{font-size:12px;color:var(--muted);}
.ti-right{flex-shrink:0;}
.status-sel{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;font-family:inherit;cursor:pointer;outline:none;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}.es-icon{font-size:48px;margin-bottom:12px;}
#dash-stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;z-index:999;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:600px){
  .ranking-wrap{grid-template-columns:1fr;}
  .info-grid{grid-template-columns:1fr;}
  .fg-row{grid-template-columns:1fr;}
  .sc-kpi{grid-template-columns:1fr 1fr;}
}

/* ═══ 대시보드 레이아웃 ═══ */
.db-wrap { display:flex; flex-direction:column; gap:16px; }

/* 기간 헤더 바 */
.db-period-bar {
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  background:linear-gradient(135deg,#1a1a2e,#0f3460);
  border-radius:14px; padding:13px 20px;
  color:#fff; font-size:13px; font-weight:600;
}
.db-period-bar .pbar-item {
  display:flex; align-items:center; gap:7px; opacity:.9;
}
.db-period-bar .pbar-badge {
  background:rgba(255,255,255,.15); border-radius:20px;
  padding:3px 12px; font-size:12px; font-weight:700;
}
.db-period-bar .pbar-title {
  font-size:11px; font-weight:700; opacity:.65; letter-spacing:.5px;
}
.db-period-sep { opacity:.3; font-size:18px; }

/* KPI 카드 행 */
.kpi-row { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; }
@media(max-width:900px){ .kpi-row{grid-template-columns:repeat(3,1fr);} }
@media(max-width:560px){ .kpi-row{grid-template-columns:repeat(2,1fr);} }

.kpi-c {

  position:relative; overflow:hidden; transition:transform .15s;
}
.kpi-c:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.1); }
.kpi-c::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
}
.kpi-c.kc-blue::before  { background:linear-gradient(90deg,#2980b9,#3498db); }
.kpi-c.kc-orange::before{ background:linear-gradient(90deg,#e67e22,#f39c12); }
.kpi-c.kc-green::before { background:linear-gradient(90deg,#27ae60,#2ecc71); }
.kpi-c.kc-purple::before{ background:linear-gradient(90deg,#8e44ad,#9b59b6); }
.kpi-c.kc-teal::before  { background:linear-gradient(90deg,#16a085,#1abc9c); }
.kpi-c.kc-red::before   { background:linear-gradient(90deg,#c0392b,#e74c3c); }

.kpi-c .kc-icon { font-size:20px; margin-bottom:6px; }
.kpi-c .kc-lbl  { font-size:10px; color:#999; font-weight:700; letter-spacing:.4px; margin-bottom:4px; }
.kpi-c .kc-val  { font-size:22px; font-weight:800; color:#1a1a2e; line-height:1; }
.kpi-c .kc-sub  { font-size:11px; margin-top:5px; font-weight:600; }

}

}

function roundPct(v){
  if(!v||v==='-')return v;
  return v.replace(/([-+]?)(\d+)\.(\d+)(%)/g,function(_,s,a,b,c){
    return (s||'')+Math.round(parseFloat(a+'.'+b))+c;
  });
}

// ===== 숫자 포맷 =====
function fmtPct(v){
  if(v===null||v===undefined) return '-';
  const n=parseFloat(v);
  if(isNaN(n)) return '-';
  return (n>=0?'+':'')+Math.round(n)+'%';
}
function fmtPct1(v){  // 소수 1자리
  if(v===null||v===undefined) return '-';
  const n=parseFloat(v);
  if(isNaN(n)) return '-';
  return (n>=0?'+':'')+n.toFixed(1)+'%';
}
function pctClass(v){
  if(v===null||v===undefined) return 'p-neu';
  return parseFloat(v)>=0?'p-pos':'p-neg';
}
function colorClass(v){
  if(v===null||v===undefined) return 'neutral';
  return parseFloat(v)>=0?'positive':'negative';
}

// ===== 현황판 =====
function buildSummary(){

    {icon:'🎯', lbl:'주간 달성율', val: total.w_achieve!=null?Math.round(total.w_achieve)+'%':'-', sub: total.w_achieve!=null?`<span class="${total.w_achieve>=100?'p-pos':'p-neg'}">${total.w_achieve>=100?'▲ 초과달성':'▼ 미달성'}</span>`:'', cls:'kc-purple'},

    <div class="kpi-c ${k.cls}">

      <div class="kc-lbl">${k.lbl}</div>

    </div>`).join('');

  // ── 바 차트 & 카드 (탭 공용) ──

  window._cardTab = window._cardTab || 'w';

  // Fix2: 매장수 표기, Fix4: 소수점 반올림
  function renderBarChart(tab){
    const subChs = SUMMARY.channels.filter(r=>r.row_type==='sub'||r.row_type==='ebiz');
    const maxVal  = Math.max(...subChs.map(r=>(tab==='w'?r.w_actual:r.m_actual)||0));
    const colors  = ['#3498db','#e67e22','#27ae60','#9b59b6','#e74c3c','#1abc9c','#f39c12'];
    const chNames = {'가두점':'가두점','백화점/아울렛':'백화/아울렛','쇼핑몰':'쇼핑몰','마트':'마트',

  function renderGauges(){
    const gauges=[
      { lbl:'주간 달성율', val:total.w_achieve, max:150, color:'#e67e22', sub:`실적 ${total.w_actual!=null?Math.round(total.w_actual).toLocaleString():'-'}백만` },
      { lbl:'월간 달성율', val:total.m_achieve, max:150, color:'#27ae60', sub:`실적 ${total.m_actual!=null?Math.round(total.m_actual).toLocaleString():'-'}백만` },
      { lbl:'주간 신장율(성인)', val:adult.w_growth,  max:null, color:'#3498db', sub:'전년 동기 대비' },
      { lbl:'월간 신장율(성인)', val:adult.m_growth,  max:null, color:'#8e44ad', sub:'전년 동기 대비' },
    ];
    const el=document.getElementById('db-gauge-grid');
    if(!el) return;
    el.innerHTML=gauges.map(g=>{
      const v   = g.val!=null?parseFloat(g.val):null;
      const str = v!=null?(g.max!=null?Math.round(v)+'%':fmtPct(v)):'-';
      const cls = v!=null?(v>=0?'pos':'neg'):'';
      // 미니 반원 SVG 게이지
      const pct = v!=null&&g.max!=null?Math.min(1,Math.max(0,v/g.max)):0;
      const r=28, cx=36, cy=36, stroke=8;
      const circumference=Math.PI*r; // 반원
      const offset=circumference*(1-pct);
      const svgGauge=g.max!=null?`
        <svg class="gauge-svg" width="72" height="42" viewBox="0 0 72 42">
          <path d="M8,36 A28,28 0 0,1 64,36" fill="none" stroke="#f0f2f8" stroke-width="${stroke}" stroke-linecap="round"/>

            stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
            style="transform-origin:36px 36px;transform:none;"/>
        </svg>`:
        `<div style="width:52px;height:52px;border-radius:50%;background:${v!=null&&v>=0?'#eafaf1':'#fdf2f2'};

          <div class="gauge-val">
            <span class="gauge-pct ${cls}">${str}</span>

function buildFilters(){
  // 실적현황 연결된 매장(area_py 있는 것)만 필터 대상
  const perfStores=STORES.filter(s=>s.area_py!=null);
  const regions=[...new Set(perfStores.map(s=>s.region).filter(Boolean))].sort();
  const cats=[...new Set(perfStores.map(s=>s.cat1).filter(Boolean))].sort();
  const mgrs=[...new Set(perfStores.map(s=>s.manager).filter(Boolean))].sort();
  document.getElementById('filter-region').innerHTML='<option value="">전체 지역</option>'+regions.map(r=>`<option>${r}</option>`).join('');
  document.getElementById('filter-category').innerHTML='<option value="">전체 유형</option>'+cats.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('filter-manager').innerHTML='<option value="">전체 담당자</option>'+mgrs.map(m=>`<option>${m}</option>`).join('');
}

function toggleExpiryFilter(){
  expiryFilterActive=!expiryFilterActive;

// ===== 매장 검색 (실적현황 313개만) =====
const PERF_STORES=STORES.filter(s=>s.area_py!=null);
function filterStores(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  const region=document.getElementById('filter-region').value;
  const cat=document.getElementById('filter-category').value;
  const mgr=document.getElementById('filter-manager').value;
  const now=new Date();
  let filtered=PERF_STORES.filter(s=>{
    if(q&&!(s.name||'').toLowerCase().includes(q))return false;
    if(region&&s.region!==region)return false;
    if(cat&&s.cat1!==cat)return false;
    if(mgr&&s.manager!==mgr)return false;
    if(expiryFilterActive){
      if(!s.contract_end)return false;
      const days=(new Date(s.contract_end)-now)/86400000;
      if(days<0||days>90)return false;
    }
    return true;
  });
  const soon=PERF_STORES.filter(s=>{
    if(!s.contract_end)return false;
    const days=(new Date(s.contract_end)-now)/86400000;
    return days>=0&&days<=90;
  }).length;
  // 랭크 오름차순 정렬 (rank 없는 매장은 맨 뒤)
  filtered.sort((a,b)=>{
    const ra=a.rank!=null?a.rank:9999;
    const rb=b.rank!=null?b.rank:9999;
    return ra-rb;
  });
  document.getElementById('st-total').textContent=PERF_STORES.length;
  document.getElementById('st-filtered').textContent=filtered.length;
  document.getElementById('st-soon').textContent=soon;
  document.getElementById('result-count').textContent=(expiryFilterActive?'[계약만료 임박] ':'')+filtered.length+'개 매장 표시 중';
  renderGrid(filtered);
}

function openModal(id){
  const s=STORES.find(x=>x.id===id); if(!s) return;
  const now=new Date();
  const contEnd=s.contract_end?new Date(s.contract_end):null;
  const dday=contEnd?Math.round((contEnd-now)/86400000):null;
  const ddayStr=dday!=null?(dday>0?'D-'+dday:(dday===0?'D-Day':'D+'+Math.abs(dday))):'-';
  const ddayColor=dday!=null&&dday<=90?'var(--danger)':'var(--success)';
  let feeStr='-';
  if(s.fixed_cost!=null) feeStr=Math.round(s.fixed_cost/1000)+'백만원 (고정)';
  else if(s.commission!=null) feeStr=(s.commission*100).toFixed(1)+'% (수수료)';
  const depStr=s.deposit!=null?Math.round(s.deposit/1000)+'백만원':'보증금 無';
  function mv(v){ return v!=null&&v!==0?Math.round(v)+'백만':'-'; }
  const areaStr=s.area_py>0?(Math.round(s.area_py)+'py'+(s.area_sales>0?' (영업 '+Math.round(s.area_sales)+'py)':'')):'-';
  const m=s.monthly||{};

  // 영업이익률 포맷
  const op=s.op_profit||{};
  function fmtOp(v){
    if(v==null) return '-';
    return (v*100).toFixed(1)+'%';
  }
  function opColor(v){
    if(v==null) return 'color:#aaa;';
    return v>=0?'color:var(--success);font-weight:700;':'color:var(--danger);font-weight:700;';
  }

  document.getElementById('modal-content').innerHTML=`
    <div class="modal-topbar">
      <h2 style="margin:0;font-size:18px;">🏪 ${s.name||s.id}</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body-grid">
      <div class="modal-left">
        <div class="modal-sec-title">매장 기본정보</div>
        <div class="info-grid">
          <div class="info-item"><div class="i-lbl">매장 ID</div><div class="i-val">${s.id}</div></div>
          <div class="info-item"><div class="i-lbl">담당자</div><div class="i-val">${s.manager||'-'}</div></div>
          <div class="info-item"><div class="i-lbl">지역(상세)</div><div class="i-val">${s.region_detail||s.region||'-'}</div></div>
          <div class="info-item"><div class="i-lbl">채널 유형</div><div class="i-val">${s.cat1||'-'}${s.store_type?'('+s.store_type+')':''}</div></div>
          <div class="info-item"><div class="i-lbl">층</div><div class="i-val">${s.floor||'-'}</div></div>
          <div class="info-item"><div class="i-lbl">전체면적 (영업면적)</div><div class="i-val">${areaStr}</div></div>
          <div class="info-item"><div class="i-lbl">오픈일자</div><div class="i-val" style="color:#1a2436;font-weight:700;">${s.open_date||'-'}</div></div>
          <div class="info-item"><div class="i-lbl">계약 종료일</div><div class="i-val" style="color:${ddayColor};font-weight:700;">${s.contract_end||'-'} <span style="font-size:12px;">(${ddayStr})</span></div></div>
          <div class="info-item"><div class="i-lbl">수수료</div><div class="i-val">${feeStr}</div></div>
          <div class="info-item"><div class="i-lbl">보증금</div><div class="i-val">${depStr}</div></div>
        </div>
      </div>
      <div class="modal-right">
        <div class="modal-sec-title">매출 실적</div>
        <div class="kpi-grid-2x2">
          <div class="kpi-box2"><div class="kb2-lbl">🟠 주간</div><div class="kb2-val weekly-c">${mv(s.w_actual)}</div><div class="kb2-pct ${colorClass(s.w_growth)}">${fmtPct(s.w_growth)}</div></div>
          <div class="kpi-box2"><div class="kb2-lbl">🟢 월간</div><div class="kb2-val monthly-c">${mv(s.m_actual)}</div><div class="kb2-pct ${colorClass(s.m_growth)}">${fmtPct(s.m_growth)}</div></div>
          <div class="kpi-box2"><div class="kb2-lbl">🟣 연간</div><div class="kb2-val annual-c">${mv(s.y_actual)}</div><div class="kb2-pct ${colorClass(s.y_growth)}">${fmtPct(s.y_growth)}</div></div>
          <div class="kpi-box2"><div class="kb2-lbl">🔵 월평균</div><div class="kb2-val" style="color:var(--accent2);">${mv(s.monthly_avg)}</div><div class="kb2-pct ${colorClass(s.monthly_avg_growth)}">${fmtPct(s.monthly_avg_growth)}</div></div>
        </div>
      </div>
    </div>
    <div class="modal-op-section">
      <div class="modal-sec-title" style="padding:8px 16px 4px;">영업이익률</div>
      <div class="op-grid-4">
        <div class="op-box"><div class="op-lbl">26년 (4월누계)</div><div class="op-val" style="${opColor(op.op26)}">${fmtOp(op.op26)}</div></div>
        <div class="op-box"><div class="op-lbl">25년 (마감)</div><div class="op-val" style="${opColor(op.op25)}">${fmtOp(op.op25)}</div></div>
        <div class="op-box"><div class="op-lbl">24년 (마감)</div><div class="op-val" style="${opColor(op.op24)}">${fmtOp(op.op24)}</div></div>
        <div class="op-box"><div class="op-lbl">23년 (마감)</div><div class="op-val" style="${opColor(op.op23)}">${fmtOp(op.op23)}</div></div>
      </div>
    </div>
    <div class="modal-chart-section">
      <div class="chart-header">
        <span class="chart-title">월매출 현황</span>
        <span class="chart-legend">
          <span class="leg-item"><span class="leg-dot" style="background:#1a2e4a;"></span>2026</span>
          <span class="leg-item"><span class="leg-dot" style="background:#5b8dd9;"></span>2025</span>
          <span class="leg-item"><span class="leg-dot" style="background:#999;"></span>2024</span>
          <span class="leg-item"><span class="leg-dot" style="background:#ccc;border:1px solid #bbb;"></span>2023</span>
        </span>
      </div>
      <div id="chart-wrap-${s.id}" class="chart-wrap"></div>
    </div>
    <div class="modal-table-wrap">
      ${buildMonthlyTable(m)}
    </div>`;

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){
    var wrap=document.getElementById('chart-wrap-'+id);
    if(wrap) wrap.innerHTML=buildChartSVG(m);
  },10);
}

function buildChartSVG(m){
  var W=940,H=190,PL=60,PR=20,PT=15,PB=32;
  var cW=W-PL-PR, cH=H-PT-PB;

  // 25년 데이터 기반 동적 Y축 (최저/중간/최고 -> 100 단위 반올림)
  var d25=(m['2025']&&m['2025'].months)?m['2025'].months.filter(function(x){return x!=null&&x>0;}):[];
  var YLEVELS, YMAX;
  if(d25.length>0){
    function niceUp(v){ return Math.ceil(v/100)*100; }
    function niceDn(v){ return Math.max(0,Math.floor(v/100)*100); }
    var rawMin=Math.min.apply(null,d25);
    var rawMax=Math.max.apply(null,d25);
    var yBot=niceDn(rawMin);
    var yTop=niceUp(rawMax);
    var yMid=Math.round((yBot+yTop)/200)*100;
    if(yMid<=yBot) yMid=yBot+100;
    if(yMid>=yTop) yMid=yTop-100;
    YLEVELS=[yBot,yMid,yTop];
    YMAX=yTop;
  } else {
    YLEVELS=[70,150,300]; YMAX=330;
  }

  function yp(v){ return PT+cH-(Math.min(v,YMAX)/YMAX)*cH; }
  function xp(i){ return PL+(i/11)*cW; }
  var SERIES=[
    {yr:'2026',color:'#1a2e4a',sw:2.5},
    {yr:'2025',color:'#5b8dd9',sw:2},
    {yr:'2024',color:'#999',sw:1.5},
    {yr:'2023',color:'#ccc',sw:1.5}
  ];
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">';
  YLEVELS.forEach(function(lv){
    var y=yp(lv);
    svg+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#eaecf2" stroke-width="1"/>';
    svg+='<text x="'+(PL-5)+'" y="'+(y+4)+'" text-anchor="end" font-size="10" fill="#aaa">'+lv+'백만</text>';
  });
  svg+='<line x1="'+PL+'" y1="'+(PT+cH)+'" x2="'+(W-PR)+'" y2="'+(PT+cH)+'" stroke="#ddd" stroke-width="1"/>';
  for(var i=0;i<12;i++){
    svg+='<text x="'+xp(i)+'" y="'+(H-6)+'" text-anchor="middle" font-size="10" fill="#aaa">'+(i+1)+'월</text>';
  }
  SERIES.forEach(function(s){
    var d=(m[s.yr]&&m[s.yr].months)?m[s.yr].months:[];
    var path='',hasPrev=false;
    for(var i=0;i<12;i++){
      var v=d[i];
      if(v==null){hasPrev=false;continue;}
      var x=xp(i),y=yp(v);
      path+=hasPrev?('L'+x+','+y):('M'+x+','+y);
      hasPrev=true;
    }
    if(path) svg+='<path d="'+path+'" fill="none" stroke="'+s.color+'" stroke-width="'+s.sw+'" stroke-linejoin="round" stroke-linecap="round"/>';
    for(var i=0;i<12;i++){
      var v=d[i];
      if(v==null) continue;
      svg+='<circle cx="'+xp(i)+'" cy="'+yp(v)+'" r="3" fill="'+s.color+'"/>';
    }
  });
  svg+='</svg>';
  return svg;
}

function buildMonthlyTable(m){
  var MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var YEARS=['2026','2025','2024','2023'];
  function fmtV(v){ return v!=null?Number(v).toLocaleString():'-'; }
  function calcPct(cur,prev){
    if(cur==null||prev==null||prev===0) return null;
    return Math.round((cur-prev)/prev*100);
  }
  function pctHtml(p){
    if(p==null) return '<span style="color:#ccc;">-</span>';
    if(p>0) return '<span style="color:#e74c3c;font-weight:700;">▲ '+p+'%</span>';
    if(p<0) return '<span style="color:#2980b9;font-weight:700;">▼ '+Math.abs(p)+'%</span>';
    return '0%';
  }
  var html='<table class="monthly-table"><thead><tr><th>구분</th><th>월평균</th><th>총합계</th>';
  MONTHS.forEach(function(mo){ html+='<th>'+mo+'</th>'; });
  html+='</tr></thead><tbody>';
  for(var yi=0;yi<YEARS.length;yi++){
    var yr=YEARS[yi];
    var d=m[yr]||{};
    var ms=d.months||new Array(12).fill(null);
    var isBold=(yr==='2026'||yr==='2025');
    var rowStyle=isBold?'font-weight:700;color:#1a2e4a;':'color:#555;';
    html+='<tr class="mtr-data"><td style="'+rowStyle+'">'+yr+'</td>';
    html+='<td style="'+rowStyle+'">'+fmtV(d.avg)+'</td><td style="'+rowStyle+'">'+fmtV(d.total)+'</td>';
    for(var i=0;i<12;i++) html+='<td style="'+rowStyle+'">'+fmtV(ms[i])+'</td>';
    html+='</tr>';
    if(yi<YEARS.length-1){
      var nextYr=YEARS[yi+1];
      var nd=m[nextYr]||{};
      var nms=nd.months||new Array(12).fill(null);
      html+='<tr class="mtr-pct"><td style="color:#888;font-size:11px;">전년(%)</td>';
      html+='<td>'+pctHtml(calcPct(d.avg,nd.avg))+'</td><td>'+pctHtml(calcPct(d.total,nd.total))+'</td>';
      for(var i=0;i<12;i++) html+='<td>'+pctHtml(calcPct(ms[i],nms[i]))+'</td>';
      html+='</tr>';
    }
  }
  html+='</tbody></table>';
  return html;
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

</script>
</body>
</html>
