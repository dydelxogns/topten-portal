<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TOP10 업무신청 포털</title>
<style>
:root{
  --bg:#f4f6fb;--card:#fff;--accent:#e8375a;--accent2:#2e75b6;
  --success:#27ae60;--danger:#e74c3c;--warning:#f39c12;--info:#2980b9;
  --muted:#8899aa;--border:#e0e6ef;--text:#1a2436;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── 로그인 ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a2e4a 0%,#2e75b6 100%);}
.login-box{background:#fff;border-radius:20px;padding:48px 40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.login-logo{font-size:28px;font-weight:900;color:#1a2e4a;margin-bottom:6px;}
.login-logo span{color:var(--accent);}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
.login-box input{width:100%;border:2px solid var(--border);border-radius:10px;padding:13px 16px;font-size:15px;outline:none;font-family:inherit;transition:border-color .2s;margin-bottom:12px;}
.login-box input:focus{border-color:var(--accent2);}
.login-btn{width:100%;background:var(--accent2);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.login-btn:hover{background:#1a5fa0;}
.login-err{color:var(--accent);font-size:13px;margin-top:8px;display:none;}

/* ── 앱 ── */
#app{display:none;}
header{background:#1a2e4a;color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.logo{font-size:18px;font-weight:900;}.logo span{color:var(--accent);}
.header-right{display:flex;gap:10px;align-items:center;}
.logout-btn,.settings-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s;}
.logout-btn:hover,.settings-btn:hover{background:rgba(255,255,255,.2);}

nav{background:var(--accent2);display:flex;overflow-x:auto;position:sticky;top:56px;z-index:99;}
nav button{background:none;border:none;color:rgba(255,255,255,.7);padding:13px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;border-bottom:3px solid transparent;font-family:inherit;}
nav button:hover{color:#fff;background:rgba(255,255,255,.08);}
nav button.active{color:#fff;border-bottom-color:var(--accent);background:rgba(255,255,255,.12);}

.page{display:none;padding:24px;max-width:900px;margin:0 auto;}
.page.active{display:block;}

/* ── 설정 모달 ── */
.setting-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.setting-overlay.open{display:flex;}
.setting-box{background:#fff;border-radius:16px;padding:32px;width:520px;max-width:95vw;}
.setting-title{font-size:18px;font-weight:800;margin-bottom:16px;}
.setting-box label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
.setting-box input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;outline:none;font-family:inherit;margin-bottom:16px;}
.setting-box input:focus{border-color:var(--accent2);}
.setting-note{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.setting-btn-row{display:flex;gap:10px;justify-content:flex-end;}
.setting-save{background:var(--accent2);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.setting-cancel{background:#f0f2ff;color:var(--accent2);border:none;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}

/* ── 폼 공통 ── */
.req-wrap{max-width:780px;margin:0 auto;}
.step-back{background:none;border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;}
.step-back:hover{border-color:var(--accent2);color:var(--accent2);}
.step-title{font-size:20px;font-weight:700;}
.step-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.task-select-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:8px;}
.task-select-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:18px 16px;cursor:pointer;transition:all .2s;font-family:inherit;text-align:left;width:100%;}
.task-select-card:hover{border-color:var(--accent2);background:#f0f2ff;transform:translateY(-1px);}
.task-select-card .tc-num{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.task-select-card .tc-icon{font-size:24px;margin-bottom:6px;}
.task-select-card .tc-name{font-size:14px;font-weight:700;line-height:1.4;}
.task-select-card .tc-timing{font-size:11px;color:var(--accent2);margin-top:4px;font-weight:600;}
.form-box{background:var(--card);border-radius:12px;padding:22px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px;}
.form-box-title{font-size:14px;font-weight:700;color:var(--accent2);margin-bottom:14px;}
.fg{margin-bottom:16px;}.fg label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
.fg label .req{color:var(--accent);}.fg label .hint{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px;}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;transition:border-color .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent2);}
.fg textarea{min-height:80px;resize:vertical;}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.radio-group{display:flex;gap:10px;flex-wrap:wrap;}
.radio-btn{border:2px solid var(--border);border-radius:8px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;background:#fff;font-family:inherit;}
.radio-btn:hover{border-color:var(--accent2);}.radio-btn.sel{border-color:var(--accent);background:#fff0f3;color:var(--accent);}
.btn-submit{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .2s;}
.btn-submit:hover{background:#c73652;}
.page-title{font-size:20px;font-weight:700;margin-bottom:20px;}

/* ── 대시보드 ── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.filter-btn{border:1.5px solid var(--border);border-radius:20px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;font-family:inherit;transition:all .2s;}
.filter-btn:hover{border-color:var(--accent2);}.filter-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2);}
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.stat-badge{background:var(--card);border-radius:12px;padding:14px 20px;text-align:center;border:1px solid var(--border);min-width:80px;}
.stat-badge .val{font-size:22px;font-weight:800;}.stat-badge .lbl{font-size:11px;color:var(--muted);margin-top:3px;}
.task-item{display:flex;gap:12px;background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);margin-bottom:8px;align-items:flex-start;}
.ti-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.dot-open{background:var(--info);}.dot-close{background:var(--danger);}.dot-admin{background:var(--success);}
.ti-left{flex:1;}.ti-store{font-size:14px;font-weight:700;margin-bottom:3px;}
.ti-type{font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:3px;}.ti-detail{font-size:12px;color:var(--muted);}
.ti-right{flex-shrink:0;}
.status-sel{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;font-family:inherit;outline:none;cursor:pointer;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .es-icon{font-size:48px;margin-bottom:12px;}
.dash-top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.clear-btn{border:1.5px solid var(--border);border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;background:#fff;font-family:inherit;}

/* ── URL 없을때 배너 ── */
.no-url-banner{background:#fff3cd;border:1.5px solid #ffc107;border-radius:12px;padding:16px 20px;margin-bottom:20px;font-size:13px;display:flex;align-items:center;gap:12px;}
.no-url-banner .nub-icon{font-size:20px;}.no-url-banner a{color:var(--accent2);font-weight:700;cursor:pointer;text-decoration:underline;}

/* ── 토스트 ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a2e4a;color:#fff;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:600;opacity:0;transition:all .35s;z-index:9999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<!-- ══════ 로그인 ══════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">TOP<span>10</span></div>
    <div class="login-sub">업무신청 포털</div>
    <input type="password" id="pw-input" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err">❌ 비밀번호가 틀렸습니다</div>
  </div>
</div>

<!-- ══════ 앱 ══════ -->
<div id="app">
<header>
  <div class="logo">TOP<span>10</span> 업무신청 포털</div>
  <div class="header-right">
    <button class="settings-btn" onclick="openSettings()">⚙️ 설정</button>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</header>
<nav>
  <button class="active" onclick="showPage('open',this)">🏗️ 신규 오픈 신청</button>
  <button onclick="showPage('close',this)">🔒 폐점·이전 신청</button>
  <button onclick="showPage('admin',this)">💻 전산·행정 신청</button>
  <button onclick="showPage('dashboard',this)">📋 할 일 대시보드</button>
</nav>

<!-- 신규 오픈 신청 -->
<div id="page-open" class="page active">
  <div class="req-wrap">
    <div id="open-step1">
      <div class="page-title">🏗️ 신규 오픈 신청</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">업무 유형을 선택하세요</div>
      <div class="task-select-grid" id="open-task-grid"></div>
    </div>
    <div id="open-step2" style="display:none;">
      <div class="step-header">
        <button class="step-back" onclick="backToStep1('open')">← 뒤로</button>
        <div class="step-title" id="open-step2-title"></div>
      </div>
      <div class="form-box">
        <div class="form-box-title">📋 공통 정보</div>
        <div class="fg"><label>구분 <span class="req">*</span></label>
          <div class="radio-group">
            <button class="radio-btn" onclick="selectRadio(this,'open-store-type','가두직영')">가두직영</button>
            <button class="radio-btn" onclick="selectRadio(this,'open-store-type','유통사')">유통사</button>
          </div>
          <input type="hidden" id="open-store-type">
        </div>
        <div class="fg-row">
          <div class="fg"><label>담당자 이름 <span class="req">*</span></label><input id="open-manager" placeholder="이름 입력"></div>
          <div class="fg"><label>매장명 <span class="req">*</span></label>
            <input id="open-store" list="open-store-dl" placeholder="매장명 검색">
            <datalist id="open-store-dl"></datalist>
          </div>
        </div>
        <div class="fg-row">
          <div class="fg"><label>신청 날짜</label><input type="date" id="open-req-date"></div>
          <div class="fg"><label>오픈 예정일</label><input type="date" id="open-target-date"></div>
        </div>
        <div class="fg"><label>요청 기한 <span class="req">*</span></label><input type="date" id="open-deadline"></div>
        <div class="fg"><label>요청 내용 <span class="req">*</span></label><textarea id="open-content" placeholder="요청 내용을 입력하세요"></textarea></div>
      </div>
      <button class="btn-submit" onclick="submitReq('open')">✅ 신청 제출하기</button>
    </div>
  </div>
</div>

<!-- 폐점·이전 신청 -->
<div id="page-close" class="page">
  <div class="req-wrap">
    <div id="close-step1">
      <div class="page-title">🔒 폐점·이전 신청</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">업무 유형을 선택하세요</div>
      <div class="task-select-grid" id="close-task-grid"></div>
    </div>
    <div id="close-step2" style="display:none;">
      <div class="step-header">
        <button class="step-back" onclick="backToStep1('close')">← 뒤로</button>
        <div class="step-title" id="close-step2-title"></div>
      </div>
      <div class="form-box">
        <div class="form-box-title">📋 공통 정보</div>
        <div class="fg"><label>구분 <span class="req">*</span></label>
          <div class="radio-group">
            <button class="radio-btn" onclick="selectRadio(this,'close-store-type','가두직영')">가두직영</button>
            <button class="radio-btn" onclick="selectRadio(this,'close-store-type','유통사')">유통사</button>
          </div>
          <input type="hidden" id="close-store-type">
        </div>
        <div class="fg-row">
          <div class="fg"><label>담당자 이름 <span class="req">*</span></label><input id="close-manager" placeholder="이름 입력"></div>
          <div class="fg"><label>매장명 <span class="req">*</span></label>
            <input id="close-store" list="close-store-dl" placeholder="매장명 검색">
            <datalist id="close-store-dl"></datalist>
          </div>
        </div>
        <div class="fg-row">
          <div class="fg"><label>신청 날짜</label><input type="date" id="close-req-date"></div>
          <div class="fg"><label>폐점 예정일</label><input type="date" id="close-target-date"></div>
        </div>
        <div class="fg"><label>요청 기한 <span class="req">*</span></label><input type="date" id="close-deadline"></div>
        <div class="fg"><label>요청 내용 <span class="req">*</span></label><textarea id="close-content" placeholder="요청 내용을 입력하세요"></textarea></div>
      </div>
      <button class="btn-submit" onclick="submitReq('close')">✅ 신청 제출하기</button>
    </div>
  </div>
</div>

<!-- 전산·행정 신청 -->
<div id="page-admin" class="page">
  <div class="req-wrap">
    <div class="page-title">💻 전산·행정 신청</div>
    <div class="form-box">
      <div class="form-box-title">📋 신청 정보</div>
      <div class="fg"><label>업무 구분 <span class="req">*</span></label>
        <select id="admin-sub">
          <option value="">선택하세요</option>
          <option>웍스(POS) 신청</option>
          <option>인터넷/전화 개통</option>
          <option>CCTV 설치/철수</option>
          <option>전산 장비 교체</option>
          <option>기안 작성</option>
          <option>ECS 공문</option>
          <option>보고서 작성</option>
          <option>기타 행정</option>
        </select>
      </div>
      <div class="fg"><label>구분 <span class="req">*</span></label>
        <div class="radio-group">
          <button class="radio-btn" onclick="selectRadio(this,'admin-store-type','가두직영')">가두직영</button>
          <button class="radio-btn" onclick="selectRadio(this,'admin-store-type','유통사')">유통사</button>
        </div>
        <input type="hidden" id="admin-store-type">
      </div>
      <div class="fg-row">
        <div class="fg"><label>담당자 이름 <span class="req">*</span></label><input id="admin-manager" placeholder="이름 입력"></div>
        <div class="fg"><label>매장명 <span class="req">*</span></label>
          <input id="admin-store" list="admin-store-dl" placeholder="매장명 검색">
          <datalist id="admin-store-dl"></datalist>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg"><label>신청 날짜</label><input type="date" id="admin-req-date"></div>
        <div class="fg"><label>요청 기한 <span class="req">*</span></label><input type="date" id="admin-deadline"></div>
      </div>
      <div class="fg"><label>요청 내용 <span class="req">*</span></label><textarea id="admin-content" placeholder="요청 내용을 입력하세요"></textarea></div>
    </div>
    <button class="btn-submit" onclick="submitReq('admin')">✅ 신청 제출하기</button>
  </div>
</div>

<!-- 할 일 대시보드 -->
<div id="page-dashboard" class="page">
  <div class="dash-top-row">
    <div class="page-title" style="margin-bottom:0;">📋 할 일 대시보드</div>
    <div style="display:flex;gap:8px;">
      <button class="clear-btn" onclick="loadDashboard()">🔄 새로고침</button>
      <button class="clear-btn" onclick="clearDone()">🗑️ 완료 정리</button>
    </div>
  </div>
  <div class="stats-row" id="dash-stats"></div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setDF('all',this)">전체</button>
    <button class="filter-btn" onclick="setDF('pending',this)">⏳ 대기중</button>
    <button class="filter-btn" onclick="setDF('progress',this)">🔄 처리중</button>
    <button class="filter-btn" onclick="setDF('done',this)">✅ 완료</button>
    <button class="filter-btn" onclick="setDF('open',this)">🏗️ 신규오픈</button>
    <button class="filter-btn" onclick="setDF('close',this)">🔒 폐점</button>
    <button class="filter-btn" onclick="setDF('admin',this)">💻 전산행정</button>
  </div>
  <div id="task-list"></div>
</div>

</div><!-- /app -->

<!-- 설정 모달 -->
<div class="setting-overlay" id="setting-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="setting-box">
    <div class="setting-title">⚙️ Apps Script 연동 설정</div>
    <label>Google Apps Script 웹 앱 URL</label>
    <input id="script-url-input" placeholder="https://script.google.com/macros/s/..." type="url">
    <div class="setting-note">
      1. Google Sheets 열기 → 확장 프로그램 → Apps Script<br>
      2. 제공된 코드 붙여넣기 → 저장(Ctrl+S)<br>
      3. 배포 → 새 배포 → 웹 앱 → 액세스: 모든 사용자<br>
      4. 생성된 URL을 위에 붙여넣기 후 저장
    </div>
    <div class="setting-btn-row">
      <button class="setting-cancel" onclick="closeSettings()">취소</button>
      <button class="setting-save" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════

const PW = 'topten10';
const AUTO_KEY = 'topten_task_autologin';

function doLogin(){
  const v = document.getElementById('pw-input').value;
  if(v === PW){
    localStorage.setItem(AUTO_KEY,'1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  } else {
    document.getElementById('login-err').style.display='block';
    document.getElementById('pw-input').value='';
  }
}
function doLogout(){
  localStorage.removeItem(AUTO_KEY);
  location.reload();
}

// ══════════════════════════════════════
//  설정 (Apps Script URL)
// ══════════════════════════════════════
const URL_KEY = 'topten_script_url';
function getScriptUrl(){ return localStorage.getItem(URL_KEY)||''; }
function openSettings(){
  document.getElementById('script-url-input').value = getScriptUrl();
  document.getElementById('setting-overlay').classList.add('open');
}
function closeSettings(){ document.getElementById('setting-overlay').classList.remove('open'); }
function saveSettings(){
  const v = document.getElementById('script-url-input').value.trim();
  localStorage.setItem(URL_KEY, v);
  closeSettings();
  showToast('✅ URL이 저장되었습니다');
}

// ══════════════════════════════════════
//  네비게이션
// ══════════════════════════════════════
function showPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='dashboard') loadDashboard();
}

// ══════════════════════════════════════
//  매장 자동완성 datalist
// ══════════════════════════════════════
function buildStoreDatalists(){
  const ids = ['open-store-dl','close-store-dl','admin-store-dl'];
  const html = STORES.map(s=>`<option value="${s.name}">`).join('');
  ids.forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=html; });
}

  {key:'asset',num:'03',icon:'📋',name:'잔존가액 파일 확인',timing:'1달 전'},
  {key:'assetproc',num:'04',icon:'💰',name:'잔존가액 처리방법',timing:'1달 전'},
  {key:'ppt',num:'05',icon:'📊',name:'PPT 작성 (폐점)',timing:'1달 전'},
  {key:'cctv',num:'06',icon:'📷',name:'CCTV 철수',timing:'폐점일'},
  {key:'doc',num:'07',icon:'📝',name:'기안/유관부서 소통',timing:'수시'},
  {key:'ecs',num:'08',icon:'📨',name:'ECS 공문',timing:'수시'},
  {key:'comm',num:'09',icon:'💬',name:'점장 소통',timing:'수시'},
  {key:'rounding',num:'10',icon:'🔍',name:'라운딩',timing:'폐점일'},
];
let currentOpenTask='', currentCloseTask='', dashFilter='all';

function buildTaskGrids(){
  document.getElementById('open-task-grid').innerHTML=OPEN_TASKS.map(t=>`
    <button class="task-select-card" onclick="openForm('open','${t.key}')">
      <div class="tc-num">TAB ${t.num}</div>
      <div class="tc-icon">${t.icon}</div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-timing">⏰ ${t.timing}</div>
    </button>`).join('');
  document.getElementById('close-task-grid').innerHTML=CLOSE_TASKS.map(t=>`
    <button class="task-select-card" onclick="openForm('close','${t.key}')">
      <div class="tc-num">TAB ${t.num}</div>
      <div class="tc-icon">${t.icon}</div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-timing">⏰ ${t.timing}</div>
    </button>`).join('');
}

function openForm(category, taskKey){
  const tasks = category==='open' ? OPEN_TASKS : CLOSE_TASKS;
  const task = tasks.find(t=>t.key===taskKey);
  if(!task) return;
  if(category==='open'){
    currentOpenTask=taskKey;
    document.getElementById('open-step2-title').textContent=task.icon+' '+task.name;
    document.getElementById('open-step1').style.display='none';
    document.getElementById('open-step2').style.display='block';
    // 오늘 날짜 기본값
    document.getElementById('open-req-date').value = todayStr();
  } else {
    currentCloseTask=taskKey;
    document.getElementById('close-step2-title').textContent=task.icon+' '+task.name;
    document.getElementById('close-step1').style.display='none';
    document.getElementById('close-step2').style.display='block';
    document.getElementById('close-req-date').value = todayStr();
  }
}
function backToStep1(category){
  if(category==='open'){
    document.getElementById('open-step1').style.display='block';
    document.getElementById('open-step2').style.display='none';
  } else {
    document.getElementById('close-step1').style.display='block';
    document.getElementById('close-step2').style.display='none';
  }
}
function selectRadio(btn, fieldId, val){
  btn.closest('.radio-group').querySelectorAll('.radio-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById(fieldId).value=val;
}
function todayStr(){
  return new Date().toISOString().slice(0,10);
}

// ══════════════════════════════════════
//  Apps Script 통신
// ══════════════════════════════════════
function getUrl(){
  const url = getScriptUrl();
  if(!url){ showToast('⚙️ 먼저 설정에서 Apps Script URL을 입력해주세요'); openSettings(); return null; }
  return url;
}
function sheetPost(data){
  const url = getUrl(); if(!url) return Promise.reject('no url');
  const fd=new FormData();
  Object.keys(data).forEach(k=>fd.append(k,data[k]??''));
  return fetch(url,{method:'POST',body:fd,mode:'no-cors'});
}
function sheetGet(callback){
  const url = getUrl(); if(!url) return;
  const cbName='cb_'+Date.now();
  window[cbName]=function(res){ callback(res); delete window[cbName]; s.remove(); };
  const s=document.createElement('script');
  s.src=url+'?cb='+cbName+'&action=getTasks&t='+Date.now();
  document.head.appendChild(s);
}

// ══════════════════════════════════════
//  신청 제출
// ══════════════════════════════════════
function submitReq(category){
  if(category==='open'){
    const manager=document.getElementById('open-manager').value.trim();
    const store=document.getElementById('open-store').value.trim();
    const storeType=document.getElementById('open-store-type').value;
    const content=document.getElementById('open-content').value.trim();
    const deadline=document.getElementById('open-deadline').value;
    if(!manager||!store||!storeType||!content||!deadline){showToast('❗ 필수 항목을 모두 입력해주세요');return;}
    const task=OPEN_TASKS.find(t=>t.key===currentOpenTask);
    sheetPost({action:'submit',category:'open',taskKey:currentOpenTask,
      typeName:'🏗️ 신규오픈 — '+(task?task.name:''),
      store,manager,storeType,content,deadline,
      reqDate:document.getElementById('open-req-date').value,
      targetDate:document.getElementById('open-target-date').value
    }).then(()=>{
      backToStep1('open');
      // 폼 초기화
      ['open-manager','open-store','open-store-type','open-content','open-deadline','open-req-date','open-target-date'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
      document.querySelectorAll('#open-step2 .radio-btn').forEach(b=>b.classList.remove('sel'));
      showToast('✅ 신청이 완료되었습니다!');
      setTimeout(()=>{showPage('dashboard',document.querySelectorAll('nav button')[3]);},1300);
    }).catch(()=>{showToast('✅ 신청 완료 (오프라인 저장 불가)');});

  } else if(category==='close'){
    const manager=document.getElementById('close-manager').value.trim();
    const store=document.getElementById('close-store').value.trim();
    const storeType=document.getElementById('close-store-type').value;
    const content=document.getElementById('close-content').value.trim();
    const deadline=document.getElementById('close-deadline').value;
    if(!manager||!store||!storeType||!content||!deadline){showToast('❗ 필수 항목을 모두 입력해주세요');return;}
    const task=CLOSE_TASKS.find(t=>t.key===currentCloseTask);
    sheetPost({action:'submit',category:'close',taskKey:currentCloseTask,
      typeName:'🔒 폐점·이전 — '+(task?task.name:''),
      store,manager,storeType,content,deadline,
      reqDate:document.getElementById('close-req-date').value,
      targetDate:document.getElementById('close-target-date').value
    }).then(()=>{
      backToStep1('close');
      ['close-manager','close-store','close-store-type','close-content','close-deadline','close-req-date','close-target-date'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
      document.querySelectorAll('#close-step2 .radio-btn').forEach(b=>b.classList.remove('sel'));
      showToast('✅ 신청이 완료되었습니다!');
      setTimeout(()=>{showPage('dashboard',document.querySelectorAll('nav button')[3]);},1300);
    }).catch(()=>{showToast('✅ 신청 완료 (오프라인 저장 불가)');});

  } else if(category==='admin'){
    const manager=document.getElementById('admin-manager').value.trim();
    const store=document.getElementById('admin-store').value.trim();
    const storeType=document.getElementById('admin-store-type').value;
    const sub=document.getElementById('admin-sub').value;
    const content=document.getElementById('admin-content').value.trim();
    const deadline=document.getElementById('admin-deadline').value;
    if(!manager||!store||!storeType||!sub||!content||!deadline){showToast('❗ 필수 항목을 모두 입력해주세요');return;}
    sheetPost({action:'submit',category:'admin',taskKey:'admin',
      typeName:'💻 전산·행정 — '+sub,
      store,manager,storeType,content,deadline,
      reqDate:document.getElementById('admin-req-date').value,targetDate:''
    }).then(()=>{
      ['admin-manager','admin-store','admin-store-type','admin-content','admin-deadline','admin-req-date'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
      document.getElementById('admin-sub').value='';
      document.querySelectorAll('#page-admin .radio-btn').forEach(b=>b.classList.remove('sel'));
      showToast('✅ 신청이 완료되었습니다!');
      setTimeout(()=>{showPage('dashboard',document.querySelectorAll('nav button')[3]);},1300);
    }).catch(()=>{showToast('✅ 신청 완료 (오프라인 저장 불가)');});
  }
}

// ══════════════════════════════════════
//  대시보드
// ══════════════════════════════════════
function loadDashboard(){
  const list=document.getElementById('task-list');
  list.innerHTML='<div class="empty-state"><div class="es-icon">⏳</div><p>데이터 불러오는 중...</p></div>';
  document.getElementById('dash-stats').innerHTML='';
  sheetGet(function(res){
    const tasks=(res&&res.tasks)?res.tasks:[];
    renderDashboardUI(tasks);
  });
}
function setDF(f,btn){
  dashFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // 현재 로드된 태스크 재렌더
  sheetGet(function(res){
    renderDashboardUI((res&&res.tasks)?res.tasks:[]);
  });
}
function renderDashboardUI(tasks){
  const pending=tasks.filter(t=>t.status==='pending').length;
  const progress=tasks.filter(t=>t.status==='progress').length;
  const done=tasks.filter(t=>t.status==='done').length;
  const today0=new Date(); today0.setHours(0,0,0,0);
  const urgent=tasks.filter(t=>{
    if(!t.deadline||t.status==='done') return false;
    const d=new Date(t.deadline); d.setHours(0,0,0,0);
    return (d-today0)/86400000<=3;
  }).length;
  document.getElementById('dash-stats').innerHTML=
    `<div class="stat-badge"><div class="val" style="color:var(--warning)">${pending}</div><div class="lbl">⏳ 대기중</div></div>`+
    `<div class="stat-badge"><div class="val" style="color:var(--info)">${progress}</div><div class="lbl">🔄 처리중</div></div>`+
    `<div class="stat-badge"><div class="val" style="color:var(--success)">${done}</div><div class="lbl">✅ 완료</div></div>`+
    `<div class="stat-badge"><div class="val" style="color:var(--danger)">${urgent}</div><div class="lbl">🚨 기한임박</div></div>`;

  let filtered=tasks;
  if(dashFilter==='pending') filtered=tasks.filter(t=>t.status==='pending');
  else if(dashFilter==='progress') filtered=tasks.filter(t=>t.status==='progress');
  else if(dashFilter==='done') filtered=tasks.filter(t=>t.status==='done');
  else if(dashFilter==='open') filtered=tasks.filter(t=>t.category==='open');
  else if(dashFilter==='close') filtered=tasks.filter(t=>t.category==='close');
  else if(dashFilter==='admin') filtered=tasks.filter(t=>t.category==='admin');

  const list=document.getElementById('task-list');
  if(!filtered.length){
    list.innerHTML='<div class="empty-state"><div class="es-icon">📭</div><p>신청 내역이 없습니다</p></div>';
    return;
  }
  const days=['일','월','화','수','목','금','토'];
  const groups={};
  filtered.forEach(t=>{
    const d=(t.createdAt||'').slice(0,10)||'날짜없음';
    if(!groups[d]) groups[d]=[];
    groups[d].push(t);
  });
  list.innerHTML=Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,items])=>{
    const dd=new Date(date);
    const label=`${date} (${days[dd.getDay()]||''})`;
    return `<div style="font-size:12px;font-weight:700;color:var(--muted);margin:8px 0 4px;padding-left:4px;">📅 ${label}</div>`
    +items.map(t=>{
      const today0=new Date(); today0.setHours(0,0,0,0);
      const dlMs=t.deadline?new Date(t.deadline):null;
      const dlDays=dlMs?Math.round((dlMs-today0)/86400000):null;
      const dlColor=(dlDays!=null&&dlDays<=3&&t.status!=='done')?'color:var(--danger);font-weight:700':'color:var(--muted)';
      const dotCls=t.category==='open'?'dot-open':t.category==='close'?'dot-close':'dot-admin';
      const tid=String(t.id).replace(/"/g,'');
      return `<div class="task-item">
        <div class="ti-dot ${dotCls}"></div>
        <div class="ti-left">
          <div class="ti-store">${t.store||''}<span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:6px;">· ${t.storeType||''}</span></div>
          <div class="ti-type">${t.typeName||''} · 담당: ${t.manager||''}</div>
          <div class="ti-detail">${t.content||''}${t.deadline?` <span style="${dlColor}"> | 기한: ${t.deadline}${dlDays!=null?' (D'+dlDays+')':''}</span>`:''}</div>
        </div>
        <div class="ti-right">
          <select class="status-sel" onchange="updateStatus('${tid}',this.value)">
            <option value="pending" ${t.status==='pending'?'selected':''}>⏳ 대기</option>
            <option value="progress" ${t.status==='progress'?'selected':''}>🔄 처리중</option>
            <option value="done" ${t.status==='done'?'selected':''}>✅ 완료</option>
          </select>
        </div>
      </div>`;
    }).join('');
  }).join('');
}
function updateStatus(id,status){
  sheetPost({action:'update',id,status})
    .then(()=>{ showToast('상태가 업데이트되었습니다'); setTimeout(loadDashboard,600); })
    .catch(()=>{});
}
function clearDone(){
  if(!confirm('완료된 항목을 모두 삭제할까요?')) return;
  sheetPost({action:'clear'})
    .then(()=>{ showToast('🗑️ 완료 항목 정리됨'); setTimeout(loadDashboard,600); })
    .catch(()=>{});
}

// ══════════════════════════════════════
//  토스트
// ══════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

  buildStoreDatalists();
  buildTaskGrids();
  document.getElementById('admin-req-date').value=todayStr();
}

window.addEventListener('DOMContentLoaded',function(){
  if(localStorage.getItem(AUTO_KEY)==='1'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  }
  document.getElementById('pw-input').addEventListener('keydown',function(e){
    if(e.key==='Enter') doLogin();
  });
});
